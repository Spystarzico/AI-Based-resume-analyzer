version: "3.8"

# ═══════════════════════════════════════════════════════════════════════════════
# AI Resume Analyzer - Full Data Engineering Stack
# Tasks covered: 12 (Hadoop), 13 (HDFS), 14-17 (Spark), 18-21 (Kafka),
#                22-23 (Airflow), 25 (Cloud Storage/MinIO), 6-9 (PostgreSQL)
# ═══════════════════════════════════════════════════════════════════════════════

networks:
  resume_net:
    driver: bridge

volumes:
  postgres_data:
  hadoop_namenode:
  hadoop_datanode:
  kafka_data:
  airflow_logs:
  minio_data:

services:

  # ─── FastAPI Backend (Task 2 - Networking, Task 30 - Final) ─────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - DATABASE_URL=postgresql://resume_user:resume_pass@postgres:5432/resume_db
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPARK_MASTER=spark://spark-master:7077
    depends_on:
      - postgres
    networks:
      - resume_net
    restart: unless-stopped

  # ─── React Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    networks:
      - resume_net

  # ─── PostgreSQL (Tasks 6, 7, 8, 9 - SQL + Data Warehousing) ─────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: resume_db
      POSTGRES_USER: resume_user
      POSTGRES_PASSWORD: resume_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - resume_net
    restart: unless-stopped

  # ─── Apache Hadoop NameNode (Tasks 12, 13 - HDFS) ───────────────────────────
  hadoop-namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: resume_namenode
    ports:
      - "9870:9870"   # NameNode Web UI
      - "9000:9000"
    environment:
      CLUSTER_NAME: resume_cluster
      CORE_CONF_fs_defaultFS: hdfs://hadoop-namenode:9000
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
    networks:
      - resume_net
    restart: unless-stopped
    profiles: ["hadoop", "full"]

  # ─── Apache Hadoop DataNode (Task 13 - HDFS Architecture) ───────────────────
  hadoop-datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: resume_datanode
    ports:
      - "9864:9864"   # DataNode Web UI
    environment:
      SERVICE_PRECONDITION: "hadoop-namenode:9870"
      CORE_CONF_fs_defaultFS: hdfs://hadoop-namenode:9000
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    depends_on:
      - hadoop-namenode
    networks:
      - resume_net
    restart: unless-stopped
    profiles: ["hadoop", "full"]

  # ─── Apache Spark Master (Tasks 14, 15, 16, 17 - Spark) ─────────────────────
  spark-master:
    image: bitnami/spark:3.4
    container_name: resume_spark_master
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
    ports:
      - "8080:8080"   # Spark Master UI
      - "7077:7077"
    networks:
      - resume_net
    restart: unless-stopped
    profiles: ["spark", "full"]

  # ─── Apache Spark Worker (Task 17 - PySpark Advanced) ───────────────────────
  spark-worker:
    image: bitnami/spark:3.4
    container_name: resume_spark_worker
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    depends_on:
      - spark-master
    networks:
      - resume_net
    restart: unless-stopped
    profiles: ["spark", "full"]

  # ─── Zookeeper (required by Kafka) ──────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: resume_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - resume_net
    restart: unless-stopped
    profiles: ["kafka", "full"]

  # ─── Apache Kafka (Tasks 19, 20 - Kafka Basics + Advanced) ──────────────────
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: resume_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    depends_on:
      - zookeeper
    networks:
      - resume_net
    restart: unless-stopped
    profiles: ["kafka", "full"]

  # ─── Kafka UI (Task 20 - Kafka Advanced monitoring) ──────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: resume_kafka_ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: resume-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka
    networks:
      - resume_net
    profiles: ["kafka", "full"]

  # ─── Apache Airflow (Tasks 22, 23 - Orchestration) ──────────────────────────
  airflow:
    image: apache/airflow:2.7.0
    container_name: resume_airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://resume_user:resume_pass@postgres/resume_db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: resume_analyzer_secret
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin123
    ports:
      - "8081:8080"   # Airflow Web UI (http://localhost:8081)
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - ./backend/app/core/python_tasks:/opt/airflow/python_tasks
    command: >
      bash -c "airflow db init &&
               airflow users create --username admin --password admin123 --firstname Admin --lastname User --role Admin --email admin@example.com &&
               airflow webserver & airflow scheduler"
    depends_on:
      - postgres
    networks:
      - resume_net
    restart: unless-stopped
    profiles: ["airflow", "full"]

  # ─── MinIO (Tasks 25 - Cloud Storage S3-compatible) ─────────────────────────
  minio:
    image: minio/minio:latest
    container_name: resume_minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console UI
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password
    volumes:
      - minio_data:/data
    networks:
      - resume_net
    restart: unless-stopped
    profiles: ["cloud", "full"]
